<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weno Fit OS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.23.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="my-4">Weno Fit OS Dashboard</h1>
        <div class="row mb-3">
            <div class="col">
                <button id="clear-history" class="btn btn-danger">Clear History</button>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Heart Rate</h5>
                        <canvas id="heart-rate-chart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Steps</h5>
                        <canvas id="steps-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Sleep</h5>
                        <canvas id="sleep-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Raw Data</h5>
                        <div id="data-container">
                            <p>Waiting for data from Weno Fit OS...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const channel = new BroadcastChannel('weno-fit-os');
        const heartRateChartCtx = document.getElementById('heart-rate-chart').getContext('2d');
        const stepsChartCtx = document.getElementById('steps-chart').getContext('2d');
        const sleepChartCtx = document.getElementById('sleep-chart').getContext('2d');

        const heartRateChart = new Chart(heartRateChartCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Heart Rate', data: [], borderColor: 'red', fill: false }] },
            options: { scales: { x: { type: 'timeseries' }, y: { beginAtZero: false } } }
        });

        const stepsChart = new Chart(stepsChartCtx, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Steps', data: [], backgroundColor: 'blue' }] },
            options: { scales: { y: { beginAtZero: true } } }
        });

        const sleepChart = new Chart(sleepChartCtx, {
            type: 'bar',
            data: { labels: ['Sleep'], datasets: [ { label: 'Light', data: [0], backgroundColor: 'lightblue' }, { label: 'Deep', data: [0], backgroundColor: 'darkblue' }, { label: 'REM', data: [0], backgroundColor: 'purple' }] },
            options: { indexAxis: 'y', scales: { x: { stacked: true }, y: { stacked: true } } }
        });

        const getStoredData = (key) => JSON.parse(localStorage.getItem(key)) || [];
        const saveStoredData = (key, data) => localStorage.setItem(key, JSON.stringify(data));

        const loadChartData = () => {
            const heartRateData = getStoredData('heartRateHistory');
            heartRateChart.data.labels = heartRateData.map(d => d.time);
            heartRateChart.data.datasets[0].data = heartRateData.map(d => d.value);
            heartRateChart.update();

            const stepsData = getStoredData('stepsHistory');
            stepsChart.data.labels = stepsData.map(d => new Date(d.time).toLocaleTimeString());
            stepsChart.data.datasets[0].data = stepsData.map(d => d.value);
            stepsChart.update();

            const sleepData = getStoredData('sleepHistory');
            if (sleepData.length > 0) {
                const lastSleep = sleepData[sleepData.length - 1];
                sleepChart.data.datasets[0].data[0] = lastSleep.light;
                sleepChart.data.datasets[1].data[0] = lastSleep.deep;
                sleepChart.data.datasets[2].data[0] = lastSleep.rem;
                sleepChart.update();
            }
        };

        channel.onmessage = (event) => {
            const dataContainer = document.getElementById("data-container");
            dataContainer.innerHTML = `<pre>${JSON.stringify(event.data, null, 2)}</pre>`;
            const now = new Date();

            let heartRateHistory = getStoredData('heartRateHistory');
            heartRateHistory.push({ time: now, value: event.data.heartRate });
            saveStoredData('heartRateHistory', heartRateHistory);

            let stepsHistory = getStoredData('stepsHistory');
            stepsHistory.push({ time: now, value: event.data.steps });
            saveStoredData('stepsHistory', stepsHistory);

            let sleepHistory = getStoredData('sleepHistory');
            sleepHistory.push(event.data.sleep);
            saveStoredData('sleepHistory', sleepHistory);
            
            loadChartData();
        };

        document.getElementById('clear-history').addEventListener('click', () => {
            localStorage.removeItem('heartRateHistory');
            localStorage.removeItem('stepsHistory');
            localStorage.removeItem('sleepHistory');
            // Reset chart data arrays
            heartRateChart.data.labels = [];
            heartRateChart.data.datasets[0].data = [];
            stepsChart.data.labels = [];
            stepsChart.data.datasets[0].data = [];
            sleepChart.data.datasets[0].data[0] = 0;
            sleepChart.data.datasets[1].data[0] = 0;
            sleepChart.data.datasets[2].data[0] = 0;
            heartRateChart.update();
            stepsChart.update();
            sleepChart.update();
        });

        document.addEventListener('DOMContentLoaded', loadChartData);
    </script>
</body>
</html>
