<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weno Fit OS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.23.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="my-4">Weno Fit OS Dashboard</h1>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Heart Rate</h5>
                        <canvas id="heart-rate-chart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Steps</h5>
                        <canvas id="steps-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Sleep</h5>
                        <canvas id="sleep-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Raw Data</h5>
                        <div id="data-container">
                            <p>Waiting for data from Weno Fit OS...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const channel = new BroadcastChannel('weno-fit-os');
        const heartRateChartCtx = document.getElementById('heart-rate-chart').getContext('2d');
        const stepsChartCtx = document.getElementById('steps-chart').getContext('2d');
        const sleepChartCtx = document.getElementById('sleep-chart').getContext('2d');

        const heartRateChart = new Chart(heartRateChartCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Heart Rate',
                    data: [],
                    borderColor: 'red',
                    fill: false
                }]
            },
            options: {
                scales: {
                    x: {
                        type: 'timeseries',
                    },
                    y: {
                        beginAtZero: false
                    }
                }
            }
        });

        const stepsChart = new Chart(stepsChartCtx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Steps',
                    data: [],
                    backgroundColor: 'blue'
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const sleepChart = new Chart(sleepChartCtx, {
            type: 'bar',
            data: {
                labels: ['Sleep'],
                datasets: [
                    {
                        label: 'Light',
                        data: [0],
                        backgroundColor: 'lightblue'
                    },
                    {
                        label: 'Deep',
                        data: [0],
                        backgroundColor: 'darkblue'
                    },
                    {
                        label: 'REM',
                        data: [0],
                        backgroundColor: 'purple'
                    }
                ]
            },
            options: {
                indexAxis: 'y',
                scales: {
                    x: {
                        stacked: true,
                    },
                    y: {
                        stacked: true
                    }
                }
            }
        });

        channel.onmessage = (event) => {
            const dataContainer = document.getElementById("data-container");
            dataContainer.innerHTML = `<pre>${JSON.stringify(event.data, null, 2)}</pre>`;

            const now = new Date();

            // Update heart rate chart
            heartRateChart.data.labels.push(now);
            heartRateChart.data.datasets[0].data.push(event.data.heartRate);
            heartRateChart.update();

            // Update steps chart
            stepsChart.data.labels.push(now.toLocaleTimeString());
            stepsChart.data.datasets[0].data.push(event.data.steps);
            stepsChart.update();

            // Update sleep chart
            sleepChart.data.datasets[0].data[0] = event.data.sleep.light;
            sleepChart.data.datasets[1].data[0] = event.data.sleep.deep;
            sleepChart.data.datasets[2].data[0] = event.data.sleep.rem;
            sleepChart.update();
        };
    </script>
</body>
</html>
