<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Acrylic OS Simulator</title>
    <style>
      body { font-family: sans-serif; margin: 0; padding: 0; background-color: #333; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
      .canvas-container { border: 2px solid white; padding: 10px; border-radius: 20px; background-color: #111; }
      canvas { border: 1px solid #555; }
    </style>
  </head>
  <body>
    <h1>Acrylic OS Simulator</h1>
    <div class="canvas-container">
      <canvas id="canvas" width="240" height="320"></canvas>
      <iframe id="react-app" style="display: none; width: 100%; height: 100%;"></iframe>
    </div>

    <div class="controls">
      <h3>UI Personalities:</h3>
      <button onclick="setPersonality('wearable')">Wearable</button>
      <button onclick="setPersonality('desktop')">Desktop</button>
      <button onclick="setPersonality('phone')">Phone</button>
      <button onclick="setPersonality('smarthome')">Smart Home</button>
      <br/><br/>
      <button id="btn_toggle_qs">Toggle Quick Settings</button>
      <button id="btn_toggle_notifications">Toggle Notifications</button>
      <button id="btn_toggle_shortcuts">Toggle Shortcuts</button>
    </div>

    <script>
      const iframe = document.getElementById('react-app');
      let reactAppReady = false;
      let pendingPersonality = null;

      function setPersonality(personality) {
        console.log(`Shell: Setting personality to: ${personality}`);
        const canvas = document.getElementById('canvas');
        const canvasContainer = document.querySelector('.canvas-container');

        if (personality === 'wearable') {
            canvas.style.display = 'block';
            iframe.style.display = 'none';
            canvasContainer.style.width = '240px';
            canvasContainer.style.height = '320px';
        } else {
            canvas.style.display = 'none';
            iframe.style.display = 'block';
            
            const expectedSrc = 'dashboard/index.html';
            if (iframe.src.indexOf(expectedSrc) === -1) {
                iframe.src = expectedSrc;
            }
            
            pendingPersonality = personality;
            if (reactAppReady) {
                console.log(`Shell: React app ready, sending pending personality: ${pendingPersonality}`);
                iframe.contentWindow.postMessage({ personality: pendingPersonality }, window.origin);
                pendingPersonality = null;
            }
            
            if (personality === 'desktop') canvasContainer.style.width = '1024px', canvasContainer.style.height = '768px';
            else if (personality === 'phone') canvasContainer.style.width = '375px', canvasContainer.style.height = '667px';
            else if (personality === 'smarthome') canvasContainer.style.width = '800px', canvasContainer.style.height = '600px';
        }
      }
    </script>

    <script type='text/javascript'>
      var lvgl_touch_x = 0;
      var lvgl_touch_y = 0;
      var lvgl_touch_down = 0;
      
      var Module = {
        canvas: (function() { return document.getElementById('canvas'); })()
      };

      Module.onRuntimeInitialized = function() {
        console.log("Shell: Emscripten runtime initialized.");
      };

      window.addEventListener('message', (event) => {
        if (event.origin !== window.origin || !event.data) return;
        const data = event.data;

        if (data.status === 'ready') {
            console.log("Shell: Received 'ready' signal from React app.");
            reactAppReady = true;
            if (pendingPersonality) {
                console.log(`Shell: Sending pending personality: ${pendingPersonality}`);
                iframe.contentWindow.postMessage({ personality: pendingPersonality }, window.origin);
                pendingPersonality = null;
            }
        }

        if (data.command && Module.ccall) {
            console.log(`Shell: Received command: ${data.command}`);
            switch (data.command) {
                case 'get_dnd_status': {
                    const status = Module.ccall('get_dnd_status', 'boolean', [], []);
                    iframe.contentWindow.postMessage({ type: 'dnd_update', status: status }, window.origin);
                    break;
                }
                case 'toggle_dnd_status': {
                    Module.ccall('toggle_dnd_status', null, [], []);
                    break;
                }
            }
        }
      });
      
      window.notifyDndChanged = (status) => {
        iframe.contentWindow.postMessage({ type: 'dnd_update', status: !!status }, window.origin);
      };

      Module.canvas.addEventListener('mousedown', (e) => { lvgl_touch_down = 1; lvgl_touch_x = e.offsetX; lvgl_touch_y = e.offsetY; });
      Module.canvas.addEventListener('mouseup', (e) => { lvgl_touch_down = 0; });
      Module.canvas.addEventListener('mousemove', (e) => { if(lvgl_touch_down) { lvgl_touch_x = e.offsetX; lvgl_touch_y = e.offsetY; } });
      Module.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      
      function weno_find_my_phone() { /* Unchanged */ }
    </script>

                iframe.contentWindow.postMessage(healthData, window.origin);
            }
        }, 5000);
    </script>
  </body>
</html>
