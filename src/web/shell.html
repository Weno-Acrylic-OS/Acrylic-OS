<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Weno Fit OS Simulator</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 0;
        background-color: #333;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .canvas-container {
        border: 2px solid white;
        padding: 10px;
        border-radius: 20px;
        background-color: #111;
      }
      canvas {
        border: 1px solid #555;
      }
    </style>
  </head>
  <body>
    <h1>Weno Fit OS Simulator</h1>
    <div class="canvas-container">
      <canvas id="canvas" width="240" height="320"></canvas>
      <iframe id="react-app" style="display: none; width: 100%; height: 100%;"></iframe>
    </div>

    <div class="controls">
      <h3>UI Personalities:</h3>
      <button onclick="setPersonality('wearable')">Wearable</button>
      <button onclick="setPersonality('desktop')">Desktop</button>
      <button onclick="setPersonality('phone')">Phone</button>
      <button onclick="setPersonality('smarthome')">Smart Home</button>
      <br/><br/>
      <button id="btn_toggle_qs">Toggle Quick Settings</button>
      <button id="btn_toggle_notifications">Toggle Notifications</button>
      <button id="btn_toggle_shortcuts">Toggle Shortcuts</button>
    </div>

    <script>
      function setPersonality(personality) {
        const canvas = document.getElementById('canvas');
        const iframe = document.getElementById('react-app');
        const canvasContainer = document.querySelector('.canvas-container');

        if (personality === 'wearable') {
            canvas.style.display = 'block';
            iframe.style.display = 'none';
            canvasContainer.style.width = '240px';
            canvasContainer.style.height = '320px';
        } else {
            canvas.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = '../dashboard/acrylic-ui/build/index.html';
            
            if (personality === 'desktop') {
                canvasContainer.style.width = '1024px';
                canvasContainer.style.height = '768px';
            } else if (personality === 'phone') {
                canvasContainer.style.width = '375px';
                canvasContainer.style.height = '667px';
            } else if (personality === 'smarthome') {
                canvasContainer.style.width = '800px';
                canvasContainer.style.height = '600px';
            }
            const channel = new BroadcastChannel('weno-fit-os');
            channel.postMessage({ personality: personality });
        }
      }
    </script>

    <script type='text/javascript'>
      var Module = {
        canvas: (function() { return document.getElementById('canvas'); })()
      };

      // Input device state
      var lvgl_touch_x = 0;
      var lvgl_touch_y = 0;
      var lvgl_touch_down = 0;

      Module.canvas.addEventListener('mousedown', function(e) {
        lvgl_touch_down = 1;
        lvgl_touch_x = e.offsetX;
        lvgl_touch_y = e.offsetY;
      });

      Module.canvas.addEventListener('mouseup', function(e) {
        lvgl_touch_down = 0;
      });

      Module.canvas.addEventListener('mousemove', function(e) {
        if (lvgl_touch_down) {
          lvgl_touch_x = e.offsetX;
          lvgl_touch_y = e.offsetY;
        }
      });

      // Prevent context menu on right click
      Module.canvas.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // --- Weno Fit OS Bridge Functions ---
      function weno_find_my_phone() {
        console.log("JS: weno_find_my_phone() called!");
        // Play a sound
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(880, audioContext.currentTime); // A5 note
          gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
          
          oscillator.start();
          oscillator.stop(audioContext.currentTime + 0.5); // Play for 0.5 seconds
        } catch (e) {
          console.error("Could not play sound:", e);
        }
        
        // Show an alert
        alert("Finding your phone... Ring! Ring!");
      }

      window.notifyDndChanged = (status) => {
        const channel = new BroadcastChannel('weno-fit-os');
        channel.postMessage({ type: 'dnd_update', status: !!status });
      };

      // Listen for commands from the React app
      const commandChannel = new BroadcastChannel('weno-fit-os');
      commandChannel.addEventListener('message', (event) => {
        if (event.data && event.data.command) {
            console.log(`Received command: ${event.data.command}`);
            switch (event.data.command) {
                case 'get_dnd_status': {
                    const status = Module.ccall('get_dnd_status', 'boolean', [], []);
                    commandChannel.postMessage({ type: 'dnd_update', status: status });
                    break;
                }
                case 'toggle_dnd_status': {
                    Module.ccall('toggle_dnd_status', null, [], []);
                    break;
                }
                // Add other commands here
            }
        }
      });
    </script>
    {{{ SCRIPT }}}
    <script>
        const channel = new BroadcastChannel('weno-fit-os');
        setInterval(() => {
            const healthData = {
                heartRate: Math.floor(Math.random() * (100 - 60 + 1)) + 60,
                steps: Math.floor(Math.random() * 10000),
                sleep: {
                    total: Math.floor(Math.random() * (8 * 60)) + 4 * 60,
                    deep: Math.floor(Math.random() * (2 * 60)) + 30,
                    light: Math.floor(Math.random() * (4 * 60)) + 2 * 60,
                    rem: Math.floor(Math.random() * 60) + 15,
                }
            };
            channel.postMessage(healthData);
        }, 5000);
    </script>
  </body>
</html>
