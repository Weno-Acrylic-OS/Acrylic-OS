<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Weno Fit OS Simulator</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 0;
        background-color: #333;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .canvas-container {
        border: 2px solid white;
        padding: 10px;
        border-radius: 20px;
        background-color: #111;
      }
      canvas {
        border: 1px solid #555;
      }
    </style>
  </head>
  <body>
    <h1>Weno Fit OS Simulator</h1>
    <div class="canvas-container">
      <canvas id="canvas" width="240" height="320"></canvas>
    </div>

    <div class="controls">
      <button id="btn_toggle_qs">Toggle Quick Settings</button>
      <button id="btn_toggle_notifications">Toggle Notifications</button>
      <button id="btn_toggle_shortcuts">Toggle Shortcuts</button>
    </div>

    <script type='text/javascript'>
      var Module = {
        canvas: (function() { return document.getElementById('canvas'); })()
      };

      // Input device state
      var lvgl_touch_x = 0;
      var lvgl_touch_y = 0;
      var lvgl_touch_down = 0;

      Module.canvas.addEventListener('mousedown', function(e) {
        lvgl_touch_down = 1;
        lvgl_touch_x = e.offsetX;
        lvgl_touch_y = e.offsetY;
      });

      Module.canvas.addEventListener('mouseup', function(e) {
        lvgl_touch_down = 0;
      });

      Module.canvas.addEventListener('mousemove', function(e) {
        if (lvgl_touch_down) {
          lvgl_touch_x = e.offsetX;
          lvgl_touch_y = e.offsetY;
        }
      });

      // Prevent context menu on right click
      Module.canvas.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

    </script>
    <script async type="text/javascript" src="weno_fit_os.js"></script>
  </body>
</html>
