name: Build Acrylic OS
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Manual Submodule Init
        run: |
          git submodule update --init x86_os/buildroot-2023.11.1 || echo "Buildroot folder already exists"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget cpio unzip rsync bc libncurses-dev flex bison libssl-dev python3 nodejs npm

      - name: Configure and Build Buildroot
        run: |
          set -e
          ROOT_DIR=$(pwd)
          EXT_PATH="$ROOT_DIR/x86_os"
          BR_DIR="$ROOT_DIR/x86_os/buildroot-2023.11.1"
          CONFIG_FILE="$ROOT_DIR/x86_os/configs/weno_defconfig"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: Cannot find config at $CONFIG_FILE"
            ls -R $EXT_PATH/configs
            exit 1
          fi

          echo "=== Configuring Buildroot ==="
          make -C "$BR_DIR" \
            BR2_EXTERNAL="$EXT_PATH" \
            defconfig BR2_DEFCONFIG="$CONFIG_FILE"
          
          echo "=== Building Buildroot (this takes a while) ==="
          timeout 3600 make -C "$BR_DIR" \
            BR2_EXTERNAL="$EXT_PATH" \
            -j2

      - name: Check Build Artifacts
        if: always()
        run: |
          BR_DIR=$(pwd)/x86_os/buildroot-2023.11.1
          
          echo "=== Checking output/images directory ==="
          if [ -d "$BR_DIR/output/images" ]; then
            ls -lah "$BR_DIR/output/images/"
          else
            echo "ERROR: output/images directory does not exist!"
          fi
          
          echo ""
          echo "=== Checking for .img files anywhere in output ==="
          find "$BR_DIR/output" -name "*.img" -type f 2>/dev/null || echo "No .img files found"
          
          echo ""
          echo "=== Checking genimage config ==="
          grep -i genimage "$BR_DIR/.config" || echo "genimage not found in config"
          
          echo ""
          echo "=== Checking rootfs options ==="
          grep -E "BR2_TARGET_ROOTFS|BR2_TARGET_GENIMAGE" "$BR_DIR/.config" || echo "No rootfs options found"

      - name: Copy Final Image
        run: |
          make -f Makefile.os

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Acrylic-OS-ARM64
          path: x86_os/buildroot-*/output/images/*