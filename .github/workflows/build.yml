name: Build Acrylic OS
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. This MUST be the first step. It wipes pre-installed bloatware.
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 2. Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Manual Submodule Init
        run: |
          # Only initialize buildroot, skip the broken companion_app
          git submodule update --init x86_os/buildroot-2023.02.8 || echo "Buildroot folder already exists"

      # 3. Now apt-get will have enough room to download index files
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget cpio unzip rsync bc libncurses-dev flex bison libssl-dev python3 nodejs npm

      - name: Build OS
        run: |
          # 1. Define Absolute Paths
          ROOT_DIR=$(pwd)
          EXT_PATH="$ROOT_DIR/x86_os"
          BR_DIR="$ROOT_DIR/x86_os/buildroot-2023.11.1"
          CONFIG_FILE="$ROOT_DIR/x86_os/configs/weno_defconfig"

          # 2. Sanity Check (This will show in your logs if it fails)
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: Cannot find config at $CONFIG_FILE"
            ls -R $EXT_PATH/configs
            exit 1
          fi

          # 3. Configure Buildroot using the ABSOLUTE path to the config
          # By using a leading '/', we bypass the ../../ confusion
          make -C "$BR_DIR" \
            BR2_EXTERNAL="$EXT_PATH" \
            defconfig BR2_DEFCONFIG="$CONFIG_FILE"
          
          # 2. DIAGNOSTIC: List every file in the images folder
          echo "Checking Buildroot output images:"
          ls -F "$BR_DIR/output/images/"

          # 4. Final Compile
          make -f Makefile.os

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Acrylic-OS-ARM64
          # Using a wildcard ensures it finds the image regardless of the exact version folder
          path: x86_os/buildroot-*/output/images/*